<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login_styles.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="js/connexion.js" defer></script>
    <title>Connexion - CBallot</title>
</head>
<body>
    <div class="central">
        <div class="text">
            <h1><img src="img/logo.png" alt="logo">ballot</h1>
            <h2>Connexion</h2>
        </div>
        <form class="group" id="connexion">
            <div class="login">
                <div class="id">
                    <img src="img/avatar.png" alt="">
                    <p>Identifiant :</p>
                </div>
                <input type="text" name="login" placeholder="Entrez ici ...">
            </div>
            <div class="password">
                <div class="pass">
                    <img src="img/password.png" alt="">
                    <p>Mot de passe :</p>
                </div>
                <input type="password" name="password" placeholder="Entrez ici ...">
            </div>
            <button type="submit">Se connecter</button>
            <a href="">Mot de passe oublié ?</a>
        </form>
    </div>
</body>
</html>
