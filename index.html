<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Connexion - CBallot</title>
</head>
<body>
    <div class="central">
        <div class="text">
            <h1><img src="img/logo.png" alt="logo">ballot</h1>
            <h2>Connexion</h2>
        </div>
        <div class="group">
            <div class="login">
                <div class="id">
                    <img src="img/avatar.png" alt="">
                    <p>Identifiant :</p>
                </div>
                <input type="text" name="login" placeholder="Entrez ici ...">
            </div>
            <div class="password">
                <div class="pass">
                    <img src="img/password.png" alt="">
                    <p>Mot de passe :</p>
                </div>
                <input type="password" name="password" placeholder="Entrez ici ...">
            </div>
            <button>Se connecter</button>
            <a href="">Mot de passe oublié ?</a>
        </div>
    </div>
</body>
</html>
